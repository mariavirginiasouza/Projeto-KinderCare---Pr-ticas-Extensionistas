{% extends 'base.html' %}
{% block content %}
<div class="card login-card">
    <h2>Definir senha de acesso</h2>
    <p class="text-muted">Escolha uma senha segura para acessar o sistema KinderCare+.</p>
    <form method="post" class="form-grid">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary">Definir senha</button>
    </form>
</div>
{% endblock %}
