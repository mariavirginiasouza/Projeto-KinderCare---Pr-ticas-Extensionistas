{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 420px; margin: 2rem auto;">
    <div style="text-align: center; margin-bottom: 1.75rem;">
        <div style="display: inline-flex; align-items: center; justify-content: center; width: 56px; height: 56px; background: var(--primary-light); border-radius: 16px; margin-bottom: 1rem;">
            <svg fill="var(--primary)" width="26px" height="26px" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
                <path d="M 28 4 C 18.059 4 10 12.059 10 22 C 10 28.5 13.3 34.2 18.3 37.7 L 18.3 44 C 18.3 45.1 19.2 46 20.3 46 L 35.7 46 C 36.8 46 37.7 45.1 37.7 44 L 37.7 37.7 C 42.7 34.2 46 28.5 46 22 C 46 12.059 37.941 4 28 4 Z M 24 34 L 24 28 L 32 28 L 32 34 Z M 28 26 C 25.8 26 24 24.2 24 22 C 24 19.8 25.8 18 28 18 C 30.2 18 32 19.8 32 22 C 32 24.2 30.2 26 28 26 Z"/>
            </svg>
        </div>
        <h2 style="margin: 0; font-size: 1.4rem; font-weight: 800;">Redefinir senha</h2>
        <p style="margin: 0.3rem 0 0; color: var(--muted); font-size: 0.875rem;">Informe seu usuário para receber o link</p>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post" class="form-grid">
        {% csrf_token %}
        <p>
            <label for="username">Usuário</label>
            <input type="text" name="username" id="username" required autofocus placeholder="Digite seu nome de usuário">
        </p>
        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 0.85rem; font-size: 1rem; margin-top: 0.5rem;">
            Enviar link de redefinição
        </button>
    </form>

    <div style="text-align: center; margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border);">
        <a href="{% url 'login' %}" style="color: var(--muted); font-size: 0.875rem; font-weight: 600; text-decoration: none;">
            ← Voltar ao login
        </a>
    </div>
</div>
{% endblock %}
