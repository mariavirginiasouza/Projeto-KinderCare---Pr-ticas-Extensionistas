{% extends 'base.html' %}
{% load static %}
{% block extra_css %}
    <link rel="stylesheet" href="{% static 'pacientes/css/form.css' %}">
    <script defer src="/static/pacientes/js/pacientes.js"></script>
{% endblock %}
{% block content %}
<div class="card">
    <h2>{{ titulo }}</h2>
    <form method="post" class="form-grid">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn-primary" type="submit">Salvar</button>
    </form>
</div>
{% endblock %}
